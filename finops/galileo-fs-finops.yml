meters:
- name: transactions
  description: Card and account transactions processed.
  unit: transaction
  aggregation: sum
  dimensions:
  - program
  - card_product
- name: active_cards
  description: Active cards.
  unit: card
  aggregation: max
  dimensions:
  - program
  - card_product
- name: ach_rtp_transfers
  description: ACH and RTP transfers.
  unit: transfer
  aggregation: sum
  dimensions:
  - program
  - rail
- name: loan_drawdowns
  description: Loan/credit draws.
  unit: draw
  aggregation: sum
  dimensions:
  - program
principles:
- name: Visibility
  description: Pull Galileo reporting endpoints; use Events API for streaming attribution.
- name: Allocation
  description: Tag accounts/cards per business unit; one program per cost center where
    possible.
- name: Optimization
  description: Use Auth API rules to lower fraud declines; right-size card products;
    choose RTP over ACH for time-sensitive flows.
- name: Accountability
  description: Program owners review monthly contract minimums vs activity.
