specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Galileo Financial Technologies
providerId: galileo-fs
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- FinTech
- BaaS
- Card Issuing
- Banking
- Payments
- ACH
- Rate Limiting
description: Galileo enforces per-program rate limits on REST APIs and short Auth
  API timeouts during authorization.
notes: Auth API timeouts are typically <2s; transaction APIs are sized to the program's
  volume.
sources:
- https://docs.galileo-ft.com/
responseCodes:
  throttled: 429
limits:
- name: Default API RPS
  scope: program
  metric: requests_per_second
  limit: 100
  notes: Default per-program throughput.
- name: Auth API Timeout
  scope: program
  metric: milliseconds
  limit: 2000
  notes: Hard timeout on synchronous authorization callbacks.
policies:
- name: Backoff Strategy
  description: Exponential backoff on 429.
- name: Idempotency
  description: Use idempotency keys on POST endpoints.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
